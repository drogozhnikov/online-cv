experiences:
    title: Опыт
    info:
      - role: A Software Team Lead
        time: Август 2024 - По настоящее время
        company: ООО "Триовист", Минск
        details: |
          Взаимодействие между руководством и инженерами, поддержка электронной системы регистрации поставщиков.
            - Управление командой: Менторство, обучение новичков, разрешение конфликтов и работа над мотивацией.
            - Техническое лидерство: Проведение код-ревью, участие в проектировании архитектуры и контроль качества кода.
            - Планирование и процессы: Распределение задач, оценка сроков, проведение дейли и планирование спринтов.
            - Найм и рост: Участие в собеседованиях и составление планов индивидуального развития для сотрудников.
            - Разработка Full-stack решения: Создание высокопроизводительного бэкенда на Kotlin/Spring Boot и адаптивных интерфейсов на Vuetify 3 для операторов и администраторов склада.
            - DevOps и контейнеризация: Настроил Docker-окружение и автоматический деплой системы электронной регистрации поставщиков на собственные сервера компании.
            - Оптимизация процессов: Провел масштабную работу по поиску слабых или неоптимизированных компонентов сстемы управления складом ЕМЕ.MWS и подготовил список мер-предложений для последующей рализации.
      - role: Software Engineer
        time: Июнь 2023 - Август 2024
        company: ООО "Триовист", Минск
        details: |
          Системы управления складом EME.WMS
          - Разработка модулей WMS: Реализация задач в ключевых бизнес-процессах: приемка, размещение, пополнение, комплектация и отгрузка товаров по требованию бизнеса.
          - Интеграция с оборудованием: Сопряжение системы с терминалами сбора данных (ТСД), принтерами этикеток и весовым оборудованием.
          - Доработки интеграция с ERP и внешними системами: Разработка механизмов обмена данными с 1С, SAP и другими учетными системами через REST API и шины данных.
          - Доработки UI составляющей системы управления складом ЕМЕ-ВМС для выполнения поставленных складом задач и оптимизации процессов.
          Проект: Система электронной регистрации поставщиков.
          - Разработка Full-stack решения: Спроектировал и реализовал с нуля систему регистрации и верификации контрагентов.
          - Бэкенд на Kotlin: Разработал бизнес-логику на Spring Boot, обеспечив надежную работу с данными и безопасную обработку заявок.
          - Современный UI: Создал адаптивный интерфейс на Vuetify 3, обеспечив удобный процесс регистрации прибытия для поставщиков.
          - DevOps и контейнеризация: Спроектировал Docker-окружение и схему работы электронной регистрации поставщиков на основе микросервисной архитектуры.
          - Оптимизация процессов: Автоматизировал сбор данных о поставщиках, что сократило время обработки входящих заявок.
          - На конец 2025г системой активно пользовалось около 300 поставщиков компании.
      - role: Java Back-end Developer
        time: June 2020 - June 2022
        company: РУП Белтаможсервис, Минск
        details: |
          Разработка коммуникационной платформы оформления деклараций eDeclarant. WebDeclarant
            - Поддержка и развитие проекта: Приведение структуры и принципов работы приложения к текущему законодательству Республики Беларусь.
            - Создание нового функционала: Реализация в проекте деклараций нового типа, а так же иснтрукций к ним.
            - Рефакторинг проекта: с целью повышения производительности, скорости работы и удобства пользовательского интерфейса
            - Поддержка пользователей, ответы на поставленные вопросы клиентов компании, решение конфликтных ситуаций.
            - Проектирование и реализация back-end составляющей сайта WebDeclarant на Spring Framework
      - role: Системный администратор
        time: Октябрь 2018 - Август 2019
        company: LLC Elitrans, Минск
        details: |
          Основные обязанности:
          - Управление сетью
          - Техническое обслуживание серверов
          - Настройка и ввод в эксплуатацию новых серверов
          - Помощь в решении технических проблем сотрудников
          - Администрирование корпоративных счетов
          - Работа с приложениями сотрудников компании на уровне L3
          - Регистрация новых сотрудников
          - Управление технической поддержкой
      - role: Системный администратор
